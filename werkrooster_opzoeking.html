.tbar label{font-size:.82rem;font-weight:600;color:#555}

.tbtn.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:13px}
.li{display:flex;align-items:center;gap:5px;font-size:.75rem;color:#666}
.ld{width:11px;height:11px;border-radius:3px;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{background:#1a1a2e;color:#fff;padding:8px 11px;text-align:left;font-weight:500;font-size:.8rem;white-space:nowrap}
td{padding:6px 11px;border-bottom:1px solid #f2f2f2;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.015)}
.msep td{background:#f5f5f5!important;padding:5px 11px;font-weight:700;font-size:.75rem;color:#999;text-transform:uppercase;letter-spacing:.04em;border-top:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8}
.badge{display:inline-block;padding:2px 8px;border-radius:9px;font-size:.76rem;font-weight:700}
.bcode{font-family:monospace;font-weight:700;font-size:.88rem}
.tval{white-space:nowrap;color:#333}
.arr{color:#bbb;margin:0 2px}
.rcode{font-size:.72rem;color:#aaa;margin-left:3px}

.shift2{border-top:1px dashed #f0c080;padding-top:3px;margin-top:3px}

const MN={3:'Maart 2026',4:'April 2026',5:'Mei 2026',6:'Juni 2026'};
let cur=null,showOff=false,filterMn='0';

function counts(naam){
  const ee=D[naam];
  const dubbel=ee.filter(e=>e.dubbel&&e.type==='werk').length;
  return {
    werk:ee.filter(e=>e.type==='werk').length,
    vrij:ee.filter(e=>e.code==='OO').length,
    res:ee.filter(e=>e.type==='reserve').length,
    dubbel:dubbel
  };
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  Object.keys(D).sort().forEach(n=>{
    const c=counts(n);
    const b=document.createElement('button');
    b.className='pbtn'+(n===cur?' on':'');
    b.innerHTML=`<div class="n">${n}</div><div class="c">${c.werk} werk &bull; ${c.dubbel} dubbel</div>`;
    b.onclick=()=>{cur=n;render();};
    g.appendChild(b);
  });
}

function shiftRow(e, isSecondary){
  if(isSecondary){
    if(!e.bant_nr2) return '';
    const tstr=e.start2&&e.eind2?`<span class="tval">${e.start2}<span class="arr">→</span>${e.eind2}</span>`:'';
    return `<div class="shift2">
      <span class="shift2-label">2e</span>
      <span class="bcode">${e.bant_nr2}</span><span class="rcode">(${e.r_code})</span>
      &nbsp;${tstr}
      &nbsp;<span style="color:#666;font-size:.82rem">${e.omschrijving2||''}</span>
    </div>`;
  }else{
    const bant=e.bant_nr?`<span class="bcode">${e.bant_nr}</span><span class="rcode">(${e.r_code})</span>`:'-';
    const tstr=e.start&&e.eind?`<span class="tval">${e.start}<span class="arr">→</span>${e.eind}${e.duur?' <span style="font-size:.7rem;color:#aaa">('+e.duur+')</span>':''}</span>`:'';
    return `<div class="shift1">${bant}&nbsp;${tstr}&nbsp;<span style="color:#444;font-size:.82rem">${e.omschrijving||''}</span></div>`;
  }
}

function render(){
  renderGrid();
  if(!cur) return;
  const c=counts(cur);
  let ee=D[cur];
  if(filterMn!=='0') ee=ee.filter(e=>e.maand===+filterMn);
  if(!showOff) ee=ee.filter(e=>e.type!=='afwezig');
  
  let rows='',lastMn=null;
  ee.forEach(e=>{
    const mk=e.maand;
    if(mk!==lastMn){
      rows+=`<tr class="msep"><td colspan="4">${MN[mk]||mk}</td></tr>`;
      lastMn=mk;
    }
    const badge=`<span class="badge" style="background:${e.bg};color:${e.fg}">${e.code}</span>`
      +(e.dubbel&&e.type==='werk'?'<span class="dubbel-badge">🛏 ×2</span>':'');
    
    const dienstInfo=`${shiftRow(e,false)}${e.dubbel&&e.type==='werk'?shiftRow(e,true):''}`;
    
    rows+=`<tr>
      <td><strong>${e.dag_num} ${MN[e.maand]||e.maand}</strong><br><span style="font-size:.75rem;color:#888">${e.dag_kort}</span></td>
      <td>${badge}</td>
      <td colspan="2">${dienstInfo}</td>
    </tr>`;
  });
  
  document.getElementById('result').innerHTML=`
    <div class="rname">${cur}</div>
    <div class="rsub">Werkrooster BANT/DB &bull; Maart – Juni 2026</div>
    <div class="stats">
      <div class="stat"><div class="v">${c.werk}</div><div class="l">Werkdagen</div></div>
      <div class="stat"><div class="v">${c.dubbel}</div><div class="l">Dubbele dienst</div></div>
      <div class="stat"><div class="v">${c.vrij}</div><div class="l">Vrije dagen</div></div>
      <div class="stat"><div class="v">${c.res}</div><div class="l">Reserve</div></div>
    </div>
    <div class="tbar">
      <label>Maand:</label>
      <select onchange="filterMn=this.value;render()">
        <option value="0">Alle maanden</option>
        <option value="3">Maart</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6">Juni</option>
      </select>
      <button class="tbtn ${showOff?'on':''}" onclick="showOff=!showOff;render()">
        Toon rustdagen / vrij
      </button>
    </div>
    <div class="leg">
      <div class="li"><div class="ld" style="background:#dcf5e7"></div>Werkdag</div>
      <div class="li"><div class="ld" style="background:#fff0d9"></div>Dubbele dienst 🛏×2</div>
      <div class="li"><div class="ld" style="background:#e3eeff"></div>Reserve</div>
      <div class="li"><div class="ld" style="background:#fff8dc"></div>Vrij (OO)</div>
      <div class="li"><div class="ld" style="background:#eee"></div>Rust (RX)</div>
    </div>
    <table>
      <thead><tr>
        <th>Datum</th><th>Code</th>
        <th colspan="2">Prestatienummer &amp; Dienst</th>
      </tr></thead>
      <tbody>${rows||'<tr><td colspan="4" style="text-align:center;color:#ccc;padding:24px">Geen gegevens voor deze selectie</td></tr>'}</tbody>
    </table>`;
}

render();
</script>
