<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAKS test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 520px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #14b8a6;
    }

    p {
      line-height: 1.6;
      margin: 12px 0;
    }

    .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #14b8a6;
      color: #082f49;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MAKS testpagina</h1>
    <p>Welkom op mijn eerste test via Coolify.</p>
    <p>Als je dit ziet, dan rijdt de server netjes volgens dienstregeling.</p>
    <div class="badge">Deploy geslaagd 🚆</div>
  </div>
</body>
</html>
